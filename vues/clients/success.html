<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email confirmé - SocialWave</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #f0f0f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Fonds animés épurés */
        body::before {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(16,217,140,0.08) 0%, transparent 70%);
            top: -150px;
            right: -100px;
            animation: float 8s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(124,111,255,0.06) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(30px, -30px) scale(1.05);
            }
        }

        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 50px 40px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, rgba(16,217,140,0.15), rgba(124,111,255,0.10));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            border: 1px solid rgba(16,217,140,0.15);
        }

        .logo {
            font-family: 'Sora', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #7c6fff;
            margin-bottom: 6px;
            letter-spacing: 0.05em;
        }

        h1 {
            font-family: 'Sora', sans-serif;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #10d98c;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: #8888aa;
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 28px;
            padding: 0 8px;
        }

        .subtitle strong {
            color: #f0f0f8;
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #7c6fff, #6b5cdb);
            color: white;
            padding: 13px 42px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(124,111,255,0.30);
        }

        .footer {
            margin-top: 28px;
            font-size: 11px;
            color: #3a3a55;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 18px;
            letter-spacing: 0.04em;
        }

        /* Ligne de séparation élégante */
        .divider {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, #7c6fff, #10d98c);
            margin: 0 auto 20px;
            border-radius: 2px;
            opacity: 0.6;
        }

        /* Timer de redirection */
        .redirect-timer {
            font-size: 12px;
            color: #555577;
            margin-top: 16px;
        }

        .redirect-timer span {
            color: #7c6fff;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-wrapper">✅</div>
        <div class="logo">🌊 SocialWave</div>
        <h1>Email confirmé</h1>
        <div class="divider"></div>
        <p class="subtitle">
            Votre adresse email a été vérifiée avec succès.<br>
            Vous pouvez maintenant <strong>vous connecter</strong> à votre compte.
        </p>

        <a href="../../index.html" class="btn">Se connecter</a>

        <p class="redirect-timer">Redirection automatique dans <span id="countdown">5</span> secondes</p>

        <div class="footer">© 2026 SocialWave</div>
    </div>

    <script>
        // Compte à rebours de redirection
        let seconds = 5;
        const timerElement = document.getElementById('countdown');

        const countdownInterval = setInterval(() => {
            seconds--;
            if (timerElement) {
                timerElement.textContent = seconds;
            }
            if (seconds <= 0) {
                clearInterval(countdownInterval);
                window.location.href = '../../index.html';
            }
        }, 1000);

        // Redirection automatique après 5 secondes (sécurité)
        setTimeout(() => {
            window.location.href = '../../index.html';
        }, 5500);
    </script>

</body>
</html>
