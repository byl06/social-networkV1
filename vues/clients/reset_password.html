<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation - SocialWave</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #f0f0f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { max-width: 420px; width: 90%; background: rgba(255,255,255,0.04); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px; }
        .logo { text-align: center; font-family: 'Sora', sans-serif; font-size: 24px; font-weight: 700; color: #7c6fff; margin-bottom: 20px; }
        .title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 10px; }
        .subtitle { color: #8888aa; text-align: center; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; color: #8888aa; margin-bottom: 8px; }
        .form-input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 11px 14px; color: #f0f0f8; font-family: 'Inter', sans-serif; font-size: 14px; outline: none; }
        .form-input:focus { border-color: rgba(124,111,255,0.5); }
        .btn { display: block; width: 100%; padding: 13px; background: rgba(124,111,255,0.25); border: 1px solid rgba(124,111,255,0.5); border-radius: 50px; color: #c4baff; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.22s ease; font-family: 'Inter', sans-serif; text-align: center; }
        .btn:hover { background: rgba(124,111,255,0.4); box-shadow: 0 8px 32px rgba(124,111,255,0.35); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .message { padding: 12px; border-radius: 10px; margin-bottom: 16px; font-size: 13px; display: none; }
        .message.error { display: block; background: rgba(255,85,119,0.15); border: 1px solid #ff5577; color: #ff5577; }
        .message.success { display: block; background: rgba(16,217,140,0.15); border: 1px solid #10d98c; color: #10d98c; }
        .text-center { text-align: center; margin-top: 16px; }
        .text-center a { color: #7c6fff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🌊 SocialWave</div>
        <div class="title">Nouveau mot de passe</div>
        <div class="subtitle">Entrez votre nouveau mot de passe</div>
        
        <div id="message" class="message"></div>
        
        <form id="resetForm" onsubmit="handleReset(event)">
            <div class="form-group">
                <label class="form-label">Nouveau mot de passe</label>
                <input class="form-input" type="password" id="newPassword" placeholder="••••••••" minlength="6" required>
            </div>
            <div class="form-group">
                <label class="form-label">Confirmer le mot de passe</label>
                <input class="form-input" type="password" id="confirmPassword" placeholder="••••••••" minlength="6" required>
            </div>
            <button type="submit" class="btn" id="resetBtn">Réinitialiser</button>
        </form>
        
        <div class="text-center">
            <a href="../../index.html">← Retour à la connexion</a>
        </div>
    </div>

    <script>
        // Récupérer le token de l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('message').textContent = 'Token invalide ou manquant';
            document.getElementById('message').className = 'message error';
            document.getElementById('resetBtn').disabled = true;
        }

        async function handleReset(event) {
            event.preventDefault();
            
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            const btn = document.getElementById('resetBtn');
            
            if (password.length < 6) {
                messageDiv.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
                messageDiv.className = 'message error';
                return;
            }
            
            if (password !== confirm) {
                messageDiv.textContent = 'Les mots de passe ne correspondent pas';
                messageDiv.className = 'message error';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Chargement...';
            messageDiv.style.display = 'none';
            
            try {
                const response = await fetch('http://localhost/social-network/api/auth/reset_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token,
                        mot_de_passe: password
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.textContent = data.message + ' Vous allez être redirigé...';
                    messageDiv.className = 'message success';
                    messageDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '../../index.html';
                    }, 3000);
                } else {
                    messageDiv.textContent = data.error || 'Erreur';
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Réinitialiser';
                }
            } catch (error) {
                messageDiv.textContent = 'Erreur de connexion au serveur';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Réinitialiser';
            }
        }
    </script>
</body>
</html>
